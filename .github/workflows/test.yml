name: test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install bd (beads)
        run: |
          # Pinned per project convention. The release tag is `v1.0.4` but the
          # asset filenames embed the bare version `1.0.4` (no `v`).
          BD_VERSION="1.0.4"
          case "${{ runner.os }}" in
            Linux)
              ASSET="beads_${BD_VERSION}_linux_amd64.tar.gz"
              ;;
            macOS)
              if [ "$(uname -m)" = "arm64" ]; then
                ASSET="beads_${BD_VERSION}_darwin_arm64.tar.gz"
              else
                ASSET="beads_${BD_VERSION}_darwin_amd64.tar.gz"
              fi
              ;;
          esac
          URL="https://github.com/gastownhall/beads/releases/download/v${BD_VERSION}/${ASSET}"
          echo "Downloading $URL"
          # --fail so a 404 exits non-zero instead of silently writing an HTML
          # error page that tar later chokes on with a cryptic message.
          curl --fail -L -o /tmp/bd.tar.gz "$URL"
          sudo tar -xzf /tmp/bd.tar.gz -C /usr/local/bin
          bd --version

      - name: Install sandbox prereq (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Create venv (matrix Python)
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install editable + dev deps
        run: uv pip install -e '.[dev]'

      - name: Run comprehensive hermetic pytest gate
        run: |
          uv run pytest -m "fast or integration" \
            --test-timeout=180 --enforce-duration-budget --durations=20 \
            --junitxml=junit.xml \
            --cov=ortus --cov-report=xml --cov-report=term

      - name: Upload pytest timing evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-py${{ matrix.python-version }}
          path: junit.xml
          if-no-files-found: warn

      - name: Upload coverage artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

  release-smoke:
    name: tagged network + live-provider smoke
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install bd (beads)
        run: |
          version="1.0.4"
          curl --fail -L -o /tmp/bd.tar.gz \
            "https://github.com/gastownhall/beads/releases/download/v${version}/beads_${version}_linux_amd64.tar.gz"
          sudo tar -xzf /tmp/bd.tar.gz -C /usr/local/bin

      - name: Install sandbox prerequisite
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Install editable + dev dependencies
        run: uv sync --extra dev

      - name: Configure optional provider credentials
        env:
          CLAUDE_CREDENTIALS_JSON: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$CLAUDE_CREDENTIALS_JSON" ]; then
            npm install --global @anthropic-ai/claude-code
            mkdir -p "$HOME/.claude"
            printf '%s' "$CLAUDE_CREDENTIALS_JSON" > "$HOME/.claude/.credentials.json"
            chmod 600 "$HOME/.claude/.credentials.json"
          fi

      - name: Run external release smoke
        run: |
          uv run pytest -m "network or live_provider" \
            --test-timeout=900 --durations=20 --junitxml=release-junit.xml

      - name: Upload release timing evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-junit
          path: release-junit.xml
          if-no-files-found: warn

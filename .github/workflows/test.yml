name: test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install bd (beads)
        run: |
          # Pinned per project convention. The release tag is `v1.0.4` but the
          # asset filenames embed the bare version `1.0.4` (no `v`).
          BD_VERSION="1.0.4"
          case "${{ runner.os }}" in
            Linux)
              ASSET="beads_${BD_VERSION}_linux_amd64.tar.gz"
              ;;
            macOS)
              if [ "$(uname -m)" = "arm64" ]; then
                ASSET="beads_${BD_VERSION}_darwin_arm64.tar.gz"
              else
                ASSET="beads_${BD_VERSION}_darwin_amd64.tar.gz"
              fi
              ;;
          esac
          URL="https://github.com/gastownhall/beads/releases/download/v${BD_VERSION}/${ASSET}"
          echo "Downloading $URL"
          # --fail so a 404 exits non-zero instead of silently writing an HTML
          # error page that tar later chokes on with a cryptic message.
          curl --fail -L -o /tmp/bd.tar.gz "$URL"
          sudo tar -xzf /tmp/bd.tar.gz -C /usr/local/bin
          bd --version

      - name: Install sandbox prereq (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Create venv (matrix Python)
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install editable + dev deps
        run: uv pip install -e '.[dev]'

      - name: Decide pytest markers from event
        id: markers
        shell: bash
        run: |
          # PR / feature branch push: unit + integration (fast inner loop).
          # Push to main: add regression. Tag push: add smoke (--slow allowed).
          markers="not slow"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            markers="not slow"  # regressions live in the same suite for now
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            markers=""  # allow slow smoke tests on tagged releases
          fi
          echo "markers=$markers" >> "$GITHUB_OUTPUT"

      - name: Run pytest with coverage
        env:
          PY_MARKERS: ${{ steps.markers.outputs.markers }}
        run: |
          if [ -n "$PY_MARKERS" ]; then
            uv run pytest --cov=ortus --cov-report=xml --cov-report=term -m "$PY_MARKERS"
          else
            uv run pytest --cov=ortus --cov-report=xml --cov-report=term
          fi

      - name: Upload coverage artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: warn

_min_copier_version: "9.0.0"

_jinja_extensions:
  - copier_templates_extensions.TemplateExtensionLoader
  - extensions/context.py:GitConfigContext
  - extensions/prerequisites.py:PrerequisiteChecker

_message_before_copy: |
  Welcome to Ortus — the origin of your next project.

  This will create a new project with:
  - Beads issue tracking
  - Claude Code configuration
  - Ralph loop automation
  - Video generation pipeline

_message_after_copy: |
  Project created successfully!

# =============================================================================
# Project Basics
# =============================================================================

project_name:
  type: str
  help: What is your project name? (lowercase, hyphens allowed)
  validator: >-
    {% if not project_name | regex_search('^[a-z][a-z0-9-]*$') %}
    Project name must be lowercase, start with a letter, and contain only letters, numbers, and hyphens.
    {% endif %}

project_description:
  type: str
  help: Short description of your project
  default: "A new project"

author_name:
  type: str
  help: Your name
  default: "{{ git_user_name }}"

author_email:
  type: str
  help: Your email
  default: "{{ git_user_email }}"

# =============================================================================
# Technology Stack
# =============================================================================

language:
  type: str
  default: python
  when: false

package_manager:
  type: str
  default: uv
  when: false

framework:
  type: str
  default: none
  when: false

linter:
  type: str
  default: ruff
  when: false

# =============================================================================
# Repository
# =============================================================================

github_username:
  type: str
  help: GitHub username or organization (for repo URL)
  default: ""

# =============================================================================
# Script Intake
# =============================================================================

has_script:
  type: bool
  help: Do you have a video script (SCRIPT.md)?
  default: false

script_path:
  type: str
  help: Path to your video script file (will be copied as SCRIPT.md)
  when: "{{ has_script }}"

style_path:
  type: str
  help: Path to your style guide file (will be copied as STYLE.md, optional)
  default: ""
  when: "{{ has_script }}"

model_path:
  type: str
  help: Path to your model config file (will be copied as MODEL.md, optional)
  default: ""
  when: "{{ has_script }}"

# =============================================================================
# Copier Settings
# =============================================================================

_subdirectory: template

_exclude:
  - copier.yaml
  - "*.pyc"
  - __pycache__
  - .git
  - .DS_Store

_skip_if_exists:
  - ".beads/*"

_tasks:
  - "chmod +x ortus/ralph.sh ortus/setup-video-beads.sh ortus/idea.sh ortus/tail.sh"
  - "git init"
  - "bd init"
  - "bd setup claude"
  - "{{ 'cp \"' + script_path + '\" SCRIPT.md' if has_script else 'true' }}"
  - "{{ 'cp \"' + style_path + '\" STYLE.md' if has_script and style_path else 'true' }}"
  - "{{ 'cp \"' + model_path + '\" MODEL.md' if has_script and model_path else 'true' }}"
  - "git add -A && git commit -m 'Initial commit from Ortus template'"
  - "./ortus/idea.sh{{ ' --script SCRIPT.md' if has_script else '' }}"
